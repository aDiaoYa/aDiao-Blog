name: Daily AI/Tech News

on:
  schedule:
    # 每天北京时间 8:00 和 18:00 (UTC+8 → UTC 0:00 和 10:00)
    - cron: "0 0,10 * * *"
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Fetch news
        run: node scripts/fetch-news.js

      - name: Commit & Push
        run: |
          git config user.name "NewsBot"
          git config user.email "newsbot@users.noreply.github.com"
          git add public/data/news.json
          git diff --staged --quiet || git commit -m "📡 每日资讯更新 $(date +'%Y-%m-%d %H:%M')"
          git push
